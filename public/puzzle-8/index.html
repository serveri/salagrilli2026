<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #181822;
      border: 4px solid #343446;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(0, 0, 0, 0.6);
    }

    #game-container canvas {
      display: block;
      margin: 0 !important;
      border: 3px solid #0a0a0f;
      border-radius: 6px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game modules (load order matters: config → data → systems → scenes → init) -->
  <script src="/puzzle-8/config.js"></script>
  <script src="/puzzle-8/data/areas.js"></script>
  <script src="/puzzle-8/systems/MapLoader.js"></script>
  <script src="/puzzle-8/systems/DialogueBox.js"></script>
  <script src="/puzzle-8/systems/Backpack.js"></script>
  <script src="/puzzle-8/scenes/BootScene.js"></script>
  <script src="/puzzle-8/scenes/MenuScene.js"></script>
  <script src="/puzzle-8/scenes/GameScene.js"></script>
  <script src="/puzzle-8/game.js" defer></script>
</head>

<body>
  <div id="game-container"></div>

  <script src="/chat-widget.js" data-puzzle="8" data-api-base="https://salagrillitchat.serveriry.fi" defer></script>
</body>

</html>
