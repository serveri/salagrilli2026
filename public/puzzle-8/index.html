<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #181822;
      border: 4px solid #343446;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(0, 0, 0, 0.6);
    }

    #game-container canvas {
      display: block;
      margin: 0 !important;
      border: 3px solid #0a0a0f;
      border-radius: 6px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #ui-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #energy-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-width: 250px;
      background: #181822;
      padding: 8px 12px;
      border: 4px solid #343446;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }

    #energy-label {
      font-weight: bold;
      font-size: 16px;
      font-family: 'Pokemon Classic', 'Courier New', monospace;
      color: #fff;
      text-transform: uppercase;
    }

    #energy-bar-bg {
      flex-grow: 1;
      height: 16px;
      background: #0a0a0f;
      border: 2px solid #343446;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    #energy-number {
      position: absolute;
      top: 35%;
      left: 30px;
      transform: translateY(-50%);
      font-family: 'Pokemon Classic', 'Courier New', monospace;
      font-size: 13px;
      color: #fff;
      text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
      z-index: 2;
    }

    #energy-bar-fill {
      height: 100%;
      width: 100%;
      /* Default to full energy */
      background: #FFD700;
      /* Yellow flat color */
    }
  </style>
  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game modules (load order matters: config → systems → scenes → init) -->
  <script src="/puzzle-8/config.js"></script>
  <script src="/puzzle-8/systems/DialogueBox.js"></script>
  <script src="/puzzle-8/systems/Backpack.js"></script>
  <script src="/puzzle-8/scenes/BootScene.js"></script>
  <script src="/puzzle-8/scenes/MenuScene.js"></script>
  <script src="/puzzle-8/scenes/GameScene.js"></script>
  <script src="/puzzle-8/game.js" defer></script>
</head>

<body>
  <div id="ui-wrapper">
    <div id="game-container"></div>

    <div id="energy-bar-container">
      <div id="energy-label">Energy</div>
      <div id="energy-bar-bg">
        <div id="energy-bar-fill"></div>
        <div id="energy-number">200</div>
      </div>
    </div>
  </div>

  <script src="/chat-widget.js" data-puzzle="8" data-api-base="https://salagrillitchat.serveriry.fi" defer></script>
</body>

</html>
