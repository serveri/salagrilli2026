services:
  chat-backend:
    build: ./server
    restart: unless-stopped
    # If a reverse proxy on this host handles TLS/public routing, bind to
    # 127.0.0.1:3000:3000 instead so the container isn't publicly exposed directly.
    ports:
      - '3000:3000'
    env_file:
      - ./server/.env
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
